name: shellcheck

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        run: |
          shellcheck -x stack-updater.sh install-deps.sh lib/stack-updater-core.sh
      - name: Bash syntax
        run: bash -n stack-updater.sh && bash -n lib/stack-updater-core.sh
